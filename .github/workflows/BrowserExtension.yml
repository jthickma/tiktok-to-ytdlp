name: Generate browser extension

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            extension/package-lock.json
            extension/code/vite/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm install

      - name: Install UI dependencies and typecheck
        working-directory: extension/code/vite
        run: npm install && npm run check

      - name: Build extension
        working-directory: extension
        run: node build.js

      - name: Rename extension artifact
        working-directory: extension
        run: mv output.zip extension.zip

      - name: Verify artifact files exist
        run: |
          test -f extension/extension.zip
          test -f extension/source.zip

      - name: Verify zip integrity
        run: |
          unzip -t extension/extension.zip >/dev/null
          unzip -t extension/source.zip >/dev/null

      - name: Get last commit SHA
        run: |
          SHORT_COMMIT_SHA="$(git rev-parse --short HEAD)"
          RELEASE_TAG="v$(date +'%Y%m%d-%H%M%S')-${SHORT_COMMIT_SHA}"
          echo "SHORT_COMMIT_SHA=${SHORT_COMMIT_SHA}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${RELEASE_TAG}" \
            -t "${RELEASE_TAG}" \
            -n "Note that this release is automatically generated. No testing has been done." \
            --generate-notes \
            "extension/extension.zip#extension.zip" \
            "extension/source.zip#source.zip"
